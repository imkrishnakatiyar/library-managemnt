{% extends "base.html" %}
{% block title %}Edit Book — Bibliotheca{% endblock %}
{% block page_title %}Edit Book{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h2>Edit Book</h2>
    <p>Update details for <em>{{ book.title }}</em></p>
  </div>
  <a href="{{ url_for('catalogue') }}" class="btn btn-outline">← Back to Catalogue</a>
</div>

<div style="max-width:680px">
  <div class="card">
    <div class="card-header"><div class="card-title">Book Information</div></div>
    <div style="padding:28px">
      <form method="POST">
        <div class="form-grid">
          <div class="form-group">
            <label>Title *</label>
            <input type="text" name="title" required value="{{ book.title }}">
          </div>
          <div class="form-group">
            <label>Author *</label>
            <input type="text" name="author" required value="{{ book.author }}">
          </div>
          <div class="form-group">
            <label>ISBN *</label>
            <input type="text" name="isbn" required value="{{ book.isbn }}">
          </div>
          <div class="form-group">
            <label>Genre</label>
            <select name="genre">
              <option value="">Select genre</option>
              {% for g in ['Fiction','Non-Fiction','Dystopian','Sci-Fi','Fantasy','Mystery','Biography','Self-Help','Technology','History','Science','Philosophy','Other'] %}
              <option {% if book.genre == g %}selected{% endif %}>{{ g }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="form-group">
            <label>Publication Year</label>
            <input type="number" name="year" value="{{ book.year }}">
          </div>
          <div class="form-group">
            <label>Total Copies</label>
            <input type="number" name="copies" required min="1" value="{{ book.total_copies }}">
          </div>
          <div class="form-group full">
            <label>Description</label>
            <textarea name="description">{{ book.description or '' }}</textarea>
          </div>
        </div>
        <div style="margin-top:24px; display:flex; gap:12px">
          <button type="submit" class="btn btn-primary">Save Changes</button>
          <a href="{{ url_for('catalogue') }}" class="btn btn-outline">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
