{% extends "base.html" %}
{% block title %}Add Book — Bibliotheca{% endblock %}
{% block page_title %}Add Book{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h2>Add New Book</h2>
    <p>Fill in the details to add a book to the catalogue</p>
  </div>
  <a href="{{ url_for('catalogue') }}" class="btn btn-outline">← Back to Catalogue</a>
</div>

<div style="max-width:680px">
  <div class="card">
    <div class="card-header"><div class="card-title">Book Information</div></div>
    <div style="padding:28px">
      <form method="POST">
        <div class="form-grid">
          <div class="form-group">
            <label>Title *</label>
            <input type="text" name="title" required placeholder="Book title">
          </div>
          <div class="form-group">
            <label>Author *</label>
            <input type="text" name="author" required placeholder="Author name">
          </div>
          <div class="form-group">
            <label>ISBN *</label>
            <input type="text" name="isbn" required placeholder="978-XXXXXXXXXX">
          </div>
          <div class="form-group">
            <label>Genre</label>
            <select name="genre">
              <option value="">Select genre</option>
              <option>Fiction</option>
              <option>Non-Fiction</option>
              <option>Dystopian</option>
              <option>Sci-Fi</option>
              <option>Fantasy</option>
              <option>Mystery</option>
              <option>Biography</option>
              <option>Self-Help</option>
              <option>Technology</option>
              <option>History</option>
              <option>Science</option>
              <option>Philosophy</option>
              <option>Other</option>
            </select>
          </div>
          <div class="form-group">
            <label>Publication Year</label>
            <input type="number" name="year" placeholder="e.g. 2023" min="1000" max="2100">
          </div>
          <div class="form-group">
            <label>Number of Copies *</label>
            <input type="number" name="copies" required min="1" value="1">
          </div>
          <div class="form-group full">
            <label>Description</label>
            <textarea name="description" placeholder="Brief description of the book…"></textarea>
          </div>
        </div>
        <div style="margin-top:24px; display:flex; gap:12px">
          <button type="submit" class="btn btn-primary">Add to Catalogue</button>
          <a href="{{ url_for('catalogue') }}" class="btn btn-outline">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
